# fetch-paper-metadata verifies auth inside the function body (getUser()).
# Disable gateway JWT verification so CORS preflight and stale/refreshing
# tokens are handled gracefully by the in-code auth logic.
[functions.fetch-paper-metadata]
verify_jwt = false

# analyze-paper verifies auth inside the function body (getUser()).
# Disable gateway JWT verification so stale/refreshing tokens don't
# cause 401 before the function code executes.
[functions.analyze-paper]
verify_jwt = false
