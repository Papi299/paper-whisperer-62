# The fetch-paper-metadata function only calls external APIs (PubMed/Crossref)
# and has no auth logic. Disable gateway JWT verification so stale tokens
# don't block the call. User-level access is still enforced by RLS on the
# papers table when inserting results.
[functions.fetch-paper-metadata]
verify_jwt = false

# analyze-paper verifies auth inside the function body (getUser()).
# Disable gateway JWT verification so stale/refreshing tokens don't
# cause 401 before the function code executes.
[functions.analyze-paper]
verify_jwt = false
